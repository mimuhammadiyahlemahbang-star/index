<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan Tahfidz Harian</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; min-height: 100vh; }

  /* NAV */
  nav { background: #1a6b4a; color: white; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
  nav h1 { font-size: 18px; font-weight: 600; }
  nav span { font-size: 13px; opacity: 0.8; flex: 1; }
  #mode-badge { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 12px; font-size: 12px; }

  /* TABS */
  .tabs { display: flex; background: white; border-bottom: 2px solid #e2e8f0; }
  .tab { padding: 12px 20px; cursor: pointer; font-size: 14px; color: #718096; border-bottom: 3px solid transparent; margin-bottom: -2px; }
  .tab.active { color: #1a6b4a; border-bottom-color: #1a6b4a; font-weight: 600; }

  /* LOGIN */
  .login-wrap { display: flex; justify-content: center; align-items: center; min-height: 80vh; padding: 20px; }
  .login-card { background: white; border-radius: 16px; padding: 32px; width: 100%; max-width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .login-card h2 { font-size: 20px; margin-bottom: 6px; color: #1a6b4a; }
  .login-card p { font-size: 13px; color: #718096; margin-bottom: 24px; }
  .login-options { display: flex; gap: 12px; margin-bottom: 20px; }
  .login-btn { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid #e2e8f0; background: white; cursor: pointer; font-size: 14px; font-weight: 600; transition: all .2s; }
  .login-btn:hover, .login-btn.active { border-color: #1a6b4a; background: #f0faf4; color: #1a6b4a; }

  /* FORMS & INPUTS */
  .container { max-width: 700px; margin: 0 auto; padding: 20px; }
  .card { background: white; border-radius: 14px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
  .card h3 { font-size: 16px; color: #1a6b4a; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
  input, select, textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 14px; transition: border .2s; background: #fafafa; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: #1a6b4a; background: white; }
  textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-group { margin-bottom: 12px; }
  .btn { padding: 11px 24px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .btn-primary { background: #1a6b4a; color: white; width: 100%; }
  .btn-primary:hover { background: #15573c; }
  .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 6px; }
  .btn-danger { background: #fff0f0; color: #c53030; border: 1px solid #fed7d7; }
  .btn-outline { background: white; border: 1.5px solid #1a6b4a; color: #1a6b4a; }

  /* BADGES */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-green { background: #c6f6d5; color: #22543d; }
  .badge-blue { background: #bee3f8; color: #2a4365; }
  .badge-purple { background: #e9d8fd; color: #44337a; }
  .badge-orange { background: #feebc8; color: #7b341e; }

  /* LAPORAN LIST */
  .laporan-item { border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 14px; margin-bottom: 10px; transition: border .2s; }
  .laporan-item:hover { border-color: #9ae6b4; }
  .laporan-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; flex-wrap: wrap; }
  .laporan-nama { font-weight: 700; font-size: 15px; color: #1a202c; }
  .laporan-tanggal { font-size: 12px; color: #a0aec0; }
  .laporan-detail { margin-top: 8px; font-size: 13px; color: #4a5568; line-height: 1.6; }
  .laporan-catatan { margin-top: 6px; font-size: 13px; color: #718096; font-style: italic; }
  .nilai-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }

  /* WALI VIEW */
  .wali-header { text-align: center; padding: 24px 20px 16px; }
  .wali-header h2 { font-size: 22px; color: #1a6b4a; margin-bottom: 4px; }
  .wali-header p { color: #718096; font-size: 14px; }
  .santri-select-card { background: white; border-radius: 14px; padding: 20px; margin: 0 20px 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); }
  .progress-bar-wrap { background: #e2e8f0; border-radius: 20px; height: 12px; overflow: hidden; }
  .progress-bar { background: linear-gradient(90deg, #1a6b4a, #38a169); height: 12px; border-radius: 20px; transition: width .5s; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat-box { background: #f7fafc; border-radius: 10px; padding: 12px; text-align: center; }
  .stat-box .val { font-size: 22px; font-weight: 700; color: #1a6b4a; }
  .stat-box .lbl { font-size: 11px; color: #718096; margin-top: 2px; }

  /* SEARCH */
  .search-bar { position: relative; margin-bottom: 14px; }
  .search-bar input { padding-left: 36px; }
  .search-bar::before { content: "🔍"; position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 14px; }

  /* EMPTY */
  .empty { text-align: center; padding: 40px 20px; color: #a0aec0; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* ALERT */
  .alert { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 14px; }
  .alert-success { background: #c6f6d5; color: #22543d; }
  .alert-error { background: #fed7d7; color: #9b2c2c; }

  /* TOPBAR GURU */
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .topbar h2 { font-size: 17px; font-weight: 700; }

  /* PIN LIST */
  .pin-list { background: #fffbeb; border: 1.5px solid #fcd34d; border-radius: 10px; padding: 14px; margin-top: 16px; }
  .pin-list h4 { font-size: 14px; color: #92400e; margin-bottom: 8px; }
  .pin-item { font-size: 12px; color: #78350f; padding: 4px 0; }
  .pin-item strong { color: #92400e; }

  /* RESPONSIVE */
  @media (max-width: 480px) {
    .form-row { grid-template-columns: 1fr; }
    .stat-grid { grid-template-columns: repeat(3, 1fr); }
    nav h1 { font-size: 15px; }
  }
</style>
</head>
<body>

if (!getData('laporan', null)) {
  setData('laporan', [
    { id: 1, santriId: 1, tanggal: '2025-04-15', jenis: 'ziyadah', surah: 'Al-Baqarah', ayatMulai: 1, ayatSelesai: 20, halaman: 2, nilaiTajwid: 'A', nilaiFasih: 'B', catatan: 'Bacaan bagus, perlu perhatikan mad', guru: 'Ust. Abdullah' },
    { id: 2, santriId: 2, tanggal: '2025-04-15', jenis: 'murojaah', surah: 'Al-Fatihah', ayatMulai: 1, ayatSelesai: 7, halaman: 1, nilaiTajwid: 'A', nilaiFasih: 'A', catatan: 'Sangat lancar dan fasih', guru: 'Usth. Fatimah' },
    { id: 3, santriId: 5, tanggal: '2025-04-14', jenis: 'ziyadah', surah: 'Ali Imran', ayatMulai: 1, ayatSelesai: 15, halaman: 50, nilaiTajwid: 'B', nilaiFasih: 'B', catatan: 'Perlu latihan tajwid lagi', guru: 'Ust. Abdullah' },

    { santriId: 13, pin: '0013' },

    { santriId: 15, pin: '0015' },
    { santriId: 16, pin: '0016' },

    { santriId: 18, pin: '0018' },
    { santriId: 19, pin: '0019' },
    { santriId: 20, pin: '0020' },
    { santriId: 21, pin: '0021' },
    { santriId: 22, pin: '0022' },

let currentMode = null;
let currentSantriId = null;
let activeTab = 'input';
let alertMsg = null;

// ── RENDER ────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!currentMode) { app.innerHTML = renderLogin(); return; }
  if (currentMode === 'guru') { app.innerHTML = renderGuru(); }
  if (currentMode === 'wali') { app.innerHTML = renderWali(); }
  updateNav();
}

function updateNav() {
  document.getElementById('mode-badge').textContent = currentMode === 'guru' ? '👨‍🏫 Guru' : '👨‍👩‍👦 Wali Murid';
  document.getElementById('nav-info').textContent = '';
}

// ── LOGIN ─────────────────────────────────────────────────────────────
let loginRole = 'wali';

function renderLogin() {
  return `
  <div class="login-wrap">
    <div class="login-card">
      <h2>Assalamu'alaikum</h2>
      <p>Silakan pilih login sebagai:</p>
      <div class="login-options">
        <button class="login-btn ${loginRole==='wali'?'active':''}" onclick="setRole('wali')">👨‍👩‍👦 Wali Murid</button>
        <button class="login-btn ${loginRole==='guru'?'active':''}" onclick="setRole('guru')">👨‍🏫 Guru</button>
      </div>
      <div class="form-group">
        <label>${loginRole === 'guru' ? 'PIN Guru' : 'PIN Wali Murid'}</label>
        <input type="password" id="pin-input" placeholder="Masukkan PIN" inputmode="numeric" maxlength="6" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      ${loginRole === 'wali' ? '<p style="font-size:12px;color:#718096;margin-bottom:12px">PIN diberikan oleh guru/sekolah untuk setiap wali murid</p>' : ''}
      <button class="btn btn-primary" onclick="doLogin()">Masuk</button>
      <div id="login-err"></div>
    </div>
  </div>`;
}

function setRole(r) { loginRole = r; render(); setTimeout(()=>document.getElementById('pin-input')?.focus(),50); }

function doLogin() {
  const pin = document.getElementById('pin-input').value.trim();
  if (loginRole === 'guru') {
    if (pin === getData('guruPin', '1234')) { currentMode = 'guru'; activeTab = 'input'; render(); return; }
    document.getElementById('login-err').innerHTML = '<div class="alert alert-error" style="margin-top:10px">PIN salah</div>';
  } else {
    const wali = getData('waliData', []).find(w => w.pin === pin);
    if (wali) { currentMode = 'wali'; currentSantriId = wali.santriId; render(); return; }
    document.getElementById('login-err').innerHTML = '<div class="alert alert-error" style="margin-top:10px">PIN tidak ditemukan</div>';
  }
}

// ── GURU VIEW ─────────────────────────────────────────────────────────
function renderGuru() {
  const tabs = ['input','daftar','santri'];
  const tabLabel = {'input':'📝 Input Laporan','daftar':'📋 Daftar Laporan','santri':'👥 Data Santri'};
  let content = '';
  if (activeTab === 'input') content = renderInputForm();
  if (activeTab === 'daftar') content = renderDaftarLaporan();
  if (activeTab === 'santri') content = renderDataSantri();
  return `
  <div class="tabs">
    ${tabs.map(t=>`<div class="tab ${activeTab===t?'active':''}" onclick="setTab('${t}')">${tabLabel[t]}</div>`).join('')}
    <div style="margin-left:auto;padding:8px 14px;cursor:pointer;font-size:13px;color:#718096" onclick="logout()">Keluar</div>
  </div>
  <div class="container">${content}</div>`;
}

function setTab(t) { activeTab = t; alertMsg = null; render(); }

function renderInputForm() {
  const santri = getData('santri', []);
  return `
  ${alertMsg ? `<div class="alert alert-success">${alertMsg}</div>` : ''}
  <div class="card">
    <h3>✏️ Input Setoran / Murojaah</h3>
    <div class="form-row">
      <div class="form-group">
        <label>Nama Santri</label>
        <select id="f-santri">
          <option value="">-- Pilih Santri --</option>
          ${santri.map(s=>`<option value="${s.id}">${s.noAbsen}. ${s.nama}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>Tanggal</label>
        <input type="date" id="f-tanggal" value="${new Date().toISOString().slice(0,10)}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Jenis</label>
        <select id="f-jenis">
          <option value="ziyadah">Ziyadah (Hafalan Baru)</option>
          <option value="murojaah">Murojaah (Hafalan Lama)</option>
          <option value="sabak">Sabak (Setoran Harian)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nama Surah</label>
        <input type="text" id="f-surah" placeholder="Contoh: Al-Baqarah">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Ayat Mulai</label>
        <input type="number" id="f-ayat-mulai" placeholder="1" min="1">
      </div>
      <div class="form-group">
        <label>Ayat Selesai</label>
        <input type="number" id="f-ayat-selesai" placeholder="20" min="1">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Halaman ke-</label>
        <input type="number" id="f-halaman" placeholder="1" min="1">
      </div>
      <div class="form-group">
        <label>Nama Guru</label>
        <input type="text" id="f-guru" placeholder="Ust./Usth. ...">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Nilai Tajwid</label>
        <select id="f-tajwid">
          <option value="A">A (Sangat Baik)</option>
          <option value="B">B (Baik)</option>
          <option value="C">C (Cukup)</option>
          <option value="D">D (Perlu Latihan)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nilai Kelancaran</label>
        <select id="f-fasih">
          <option value="A">A (Sangat Lancar)</option>
          <option value="B">B (Lancar)</option>
          <option value="C">C (Cukup)</option>
          <option value="D">D (Perlu Latihan)</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Catatan untuk Wali Murid</label>
      <textarea id="f-catatan" placeholder="Tuliskan perkembangan, saran, atau informasi untuk orang tua..."></textarea>
    </div>
    <button class="btn btn-primary" onclick="simpanLaporan()">💾 Simpan Laporan</button>
  </div>`;
}

function simpanLaporan() {
  const santriId = parseInt(document.getElementById('f-santri').value);
  const tanggal = document.getElementById('f-tanggal').value;
  const surah = document.getElementById('f-surah').value.trim();
  if (!santriId) { alert('Pilih santri terlebih dahulu'); return; }
  if (!tanggal) { alert('Isi tanggal'); return; }
  if (!surah) { alert('Isi nama surah'); return; }
  const laporan = getData('laporan', []);
  const id = Date.now();
  laporan.unshift({
    id, santriId, tanggal,
    jenis: document.getElementById('f-jenis').value,
    surah,
    ayatMulai: parseInt(document.getElementById('f-ayat-mulai').value) || 1,
    ayatSelesai: parseInt(document.getElementById('f-ayat-selesai').value) || 1,
    halaman: parseInt(document.getElementById('f-halaman').value) || 1,
    nilaiTajwid: document.getElementById('f-tajwid').value,
    nilaiFasih: document.getElementById('f-fasih').value,
    catatan: document.getElementById('f-catatan').value.trim(),
    guru: document.getElementById('f-guru').value.trim() || 'Guru',
  });
  setData('laporan', laporan);
  alertMsg = '✅ Laporan berhasil disimpan! Wali murid dapat melihatnya sekarang.';
  render();
}

function renderDaftarLaporan() {
  const laporan = getData('laporan', []);
  const santri = getData('santri', []);
  const search = document.getElementById('search-val')?.value || '';
  let filtered = laporan;
  if (search) filtered = laporan.filter(l => {
    const s = santri.find(x=>x.id===l.santriId);
    return s?.nama.toLowerCase().includes(search.toLowerCase()) || l.surah.toLowerCase().includes(search.toLowerCase());
  });
  return `
  <div class="topbar">
    <h2>Daftar Laporan (${filtered.length})</h2>
  </div>
  <div class="search-bar">
    <input type="text" id="search-val" placeholder="Cari nama santri atau surah..." oninput="renderSearch()" value="${search}">
  </div>
  ${filtered.length === 0 ? `<div class="empty"><div class="empty-icon">📄</div><p>Belum ada laporan</p></div>` :
    filtered.map(l => {
      const s = santri.find(x=>x.id===l.santriId);
      const jenisColor = l.jenis==='ziyadah'?'badge-green':l.jenis==='murojaah'?'badge-blue':'badge-purple';
      return `<div class="laporan-item">
        <div class="laporan-header">
          <div>
            <div class="laporan-nama">${s?.noAbsen}. ${s?.nama || 'Tidak diketahui'}</div>
            <div class="laporan-tanggal">${formatTanggal(l.tanggal)} · ${l.guru}</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <span class="badge ${jenisColor}">${l.jenis}</span>
            <button class="btn btn-sm btn-danger" onclick="hapusLaporan(${l.id})">🗑</button>
          </div>
        </div>
        <div class="laporan-detail">
          📖 ${l.surah} ayat ${l.ayatMulai}–${l.ayatSelesai} · Hal. ${l.halaman}
        </div>
        <div class="nilai-row">
          <span class="badge badge-green">Tajwid: ${l.nilaiTajwid}</span>
          <span class="badge badge-blue">Kelancaran: ${l.nilaiFasih}</span>
        </div>
        ${l.catatan ? `<div class="laporan-catatan">💬 "${l.catatan}"</div>` : ''}
      </div>`;
    }).join('')}`;
}

function renderSearch() {
  document.querySelector('.container').innerHTML = renderDaftarLaporan();
}

function hapusLaporan(id) {
  if (!confirm('Hapus laporan ini?')) return;
  const laporan = getData('laporan', []).filter(l => l.id !== id);
  setData('laporan', laporan);
  render();
}

function renderDataSantri() {
  const santri = getData('santri', []);
  const wali = getData('waliData', []);
  return `
  <div class="topbar">
    <h2>Data Santri Kelas 2A (${santri.length} Siswa)</h2>
  </div>
  ${santri.map(s => {
    const w = wali.find(x=>x.santriId===s.id);
    const laporan = getData('laporan', []).filter(l=>l.santriId===s.id);
    return `<div class="card" style="padding:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-weight:700">${s.noAbsen}. ${s.nama}</div>
          <div style="font-size:13px;color:#718096">Kelas ${s.kelas} · Target ${s.targetJuz} Juz · ${laporan.length} laporan</div>
          <div style="font-size:12px;color:#a0aec0;margin-top:4px">PIN Wali: <b>${w?.pin || '-'}</b></div>
        </div>
      </div>
    </div>`;
  }).join('')}
  
  <div class="pin-list">
    <h4>📋 Daftar PIN Wali Murid (untuk dibagikan)</h4>
    ${santri.slice(0, 22).map(s => {
      const w = wali.find(x=>x.santriId===s.id);
      return `<div class="pin-item">${s.noAbsen}. <strong>${s.nama}</strong> → PIN: <strong>${w?.pin}</strong></div>`;
    }).join('')}
  </div>`;
}

// ── WALI VIEW ─────────────────────────────────────────────────────────
function renderWali() {
  const santri = getData('santri', []).find(s=>s.id===currentSantriId);
  if (!santri) { currentMode = null; render(); return ''; }
  const laporan = getData('laporan', []).filter(l=>l.santriId===currentSantriId);
  const totalAyat = laporan.reduce((a,l)=> a + (l.jenis==='ziyadah' ? (l.ayatSelesai-l.ayatMulai+1) : 0), 0);
  const sesiCount = laporan.length;
  const avgTajwid = laporan.length ? laporan.filter(l=>l.nilaiTajwid==='A').length : 0;
  const progress = Math.min(100, Math.round((totalAyat / (santri.targetJuz * 100)) * 100));

  return `
  <div style="display:flex;justify-content:flex-end;padding:8px 16px">
    <span onclick="logout()" style="cursor:pointer;font-size:13px;color:#718096">Keluar</span>
  </div>
  <div class="wali-header">
    <h2>Assalamu'alaikum</h2>
    <p>Laporan tahfidz putra/putri Anda</p>
  </div>
  <div class="container" style="padding-top:0">
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
        <div style="width:48px;height:48px;background:#c6f6d5;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px">📖</div>
        <div>
          <div style="font-size:18px;font-weight:700">${santri.nama}</div>
          <div style="font-size:13px;color:#718096">Kelas ${santri.kelas} · Target ${santri.targetJuz} Juz</div>
        </div>
      </div>
      <div style="margin-bottom:6px;font-size:13px;color:#4a5568;font-weight:600">Progress Hafalan</div>
      <div class="progress-bar-wrap" style="margin-bottom:6px">
        <div class="progress-bar" style="width:${progress}%"></div>
      </div>
      <div style="font-size:12px;color:#718096;text-align:right">${progress}% dari target</div>
    </div>

    <div class="stat-grid">
      <div class="stat-box"><div class="val">${sesiCount}</div><div class="lbl">Total Sesi</div></div>
      <div class="stat-box"><div class="val">${totalAyat}</div><div class="lbl">Ayat Dihafal</div></div>
      <div class="stat-box"><div class="val">${avgTajwid}</div><div class="lbl">Nilai A</div></div>
    </div>

    <div class="card">
      <h3>📋 Riwayat Setoran</h3>
      ${laporan.length === 0 ? `<div class="empty"><div class="empty-icon">📄</div><p>Belum ada laporan</p></div>` :
        laporan.map(l => {
          const jenisColor = l.jenis==='ziyadah'?'badge-green':l.jenis==='murojaah'?'badge-blue':'badge-purple';
          return `<div class="laporan-item">
            <div class="laporan-header">
              <div>
                <div class="laporan-tanggal">${formatTanggal(l.tanggal)} · ${l.guru}</div>
              </div>
              <span class="badge ${jenisColor}">${l.jenis}</span>
            </div>
            <div class="laporan-detail">📖 ${l.surah} ayat ${l.ayatMulai}–${l.ayatSelesai}</div>
            <div class="nilai-row">
              <span class="badge badge-green">Tajwid: ${l.nilaiTajwid}</span>
              <span class="badge badge-blue">Kelancaran: ${l.nilaiFasih}</span>
            </div>
            ${l.catatan ? `<div class="laporan-catatan">💬 ${l.catatan}</div>` : ''}
          </div>`;
        }).join('')}
    </div>
  </div>`;
}

// ── UTILS ─────────────────────────────────────────────────────────────
function logout() { currentMode = null; currentSantriId = null; loginRole = 'wali'; render(); }

function formatTanggal(str) {
  try {
    const d = new Date(str + 'T00:00:00');
    return d.toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
  } catch { return str; }
}

render();
</script>
</body>
</html>
